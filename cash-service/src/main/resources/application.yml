server:
  port: ${CASH_SERVICE_PORT:9004}

account:
  service:
    url: ${ACCOUNT_SERVICE_URL:http://bank-account-service:9005}

notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL:http://bank-notification-service:9006}

spring:
  application:
    name: cash-service

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:bank-kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

#  config:
#    import: "optional:consul:${CONSUL_HOST:localhost}:${CONSUL_PORT:8500}"

#  cloud:
#    consul:
#      host: ${CONSUL_HOST:localhost}
#      port: ${CONSUL_PORT:8500}
