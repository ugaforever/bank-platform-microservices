server:
  port: 9001

spring:
  application:
    name: gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          # Адрес issuer (Keycloak realm). Gateway по нему получает ключи
          # и параметры токена, чтобы валидировать JWT от UI
          issuer-uri: http://localhost:9002/realms/bank-realm

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: transfer-service
              uri: http://localhost:9003
              predicates:
                - Path=/transfers/**
              filters:
                - name: JwtTokenRelay

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    root: INFO
    ru.practicum.bank.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG