server:
  port: ${CASH_SERVER_PORT:9003}

account:
  service:
    url: ${ACCOUNT_SERVICE_URL:http://localhost:9005}

notification:
  service:
    url: ${NOTIFICATION_SERVICE_URL:http://localhost:9006}

spring:
  application:
    name: transfer-service

  config:
    import: "optional:consul:${CONSUL_HOST:localhost}:${CONSUL_PORT:8500}"

  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      config:
        #spring.datasource.* изменение в Consul не может обновить в приложении из-за особенности бина datasource
        format: PROPERTIES
        prefix: config
        name: ${spring.application.name}
        data-key: data
      discovery:
        enabled: true
        instance-id: ${spring.application.name}:${random.value}
        prefer-ip-address: true
        service-name: ${spring.application.name}
        health-check-path: /actuator/health
        health-check-interval: 10s
    gateway:
      routes:
        - id: account-service-route
          uri: lb://account-service
          predicates:
            - Path=/account/**
        #          TODO: uncomment
        #          filters:
        #            - name: TokenRelay

        - id: notification-service-route
          uri: lb://notification-service
          predicates:
            - Path=/notification/**
        #          TODO: uncomment
        #          filters:
        #            - name: TokenRelay

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9002/realms/bank-realm}
#      client:
#        registration:
#          transfer-service:
#            provider: keycloak
#            client-id: transfer-service
#            client-secret: D68a7ktWHTKeZIwQRwTI0FrpJLZzq3AK
#            authorization-grant-type: client_credentials
#        provider:
#          keycloak:
#            issuer-uri: http://localhost:9002/realms/bank-realm

  kafka:
    bootstrap-servers: bank-kafka:9092
    consumer:
      group-id: transfer-saga-orchestrator
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      max-poll-records: 10
    listener:
      ack-mode: manual
      shutdown-timeout: 30000

feign:
  httpclient:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
    metrics:
      enabled: true
    circuitbreakers:
      enabled: true

resilience4j.circuitbreaker:
  configs:
    default:
      registerHealthIndicator: true
      slidingWindowType: COUNT_BASED
      slidingWindowSize: 10
      minimumNumberOfCalls: 10
      failureRateThreshold: 50
      waitDurationInOpenState: 30000
      permittedNumberOfCallsInHalfOpenState: 5
      automaticTransitionFromOpenToHalfOpenEnabled: true
  instances:
    cashServiceDeposit:
      registerHealthIndicator: true
    cashServiceWithdraw:
      registerHealthIndicator: true

logging:
  level:
    org.springframework.cloud.consul: DEBUG
    org.springframework.boot.context.config: DEBUG