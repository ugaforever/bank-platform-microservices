bank:
  account-service:
    base-url: http://localhost:9005

spring:
  application:
    name: transfer-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/transfers}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9002/realms/bank-realm
      client:
        registration:
          transfer-service:
            provider: keycloak
            client-id: transfer-service
            client-secret: D68a7ktWHTKeZIwQRwTI0FrpJLZzq3AK
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: http://localhost:9002/realms/bank-realm

server:
  port: ${CASH_SERVER_PORT:9003}

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always