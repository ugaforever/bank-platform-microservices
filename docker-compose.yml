services:
# ================================
# Keycloak (Auth)
# ================================
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: bank-keycloak
    command: start-dev # --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_SCRIPT_UPLOAD_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT}:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9002/health/ready" ]
      interval: 10s
      timeout: 10s
      retries: 5

# ================================
# Consul (Service Discovery)
# ================================
  consul:
    image: hashicorp/consul:latest
    container_name: bank-consul
    restart: unless-stopped
    ports:
      - "${CONSUL_HTTP_PORT}:8500"
      - "${CONSUL_DNS_PORT}:8600/udp"
    command: 'agent -server -bootstrap-expect=1 -ui -bind=0.0.0.0 -client=0.0.0.0'

# ================================
# PostgreSQL Databases
# ================================
  account-db:
    image: postgres:16
    container_name: bank-account-db
    environment:
      POSTGRES_DB: ${ACCOUNT_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${ACCOUNT_DB_PORT}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - account-db-data:/var/lib/postgresql/data

  cash-db:
    image: postgres:16
    container_name: bank-cash-db
    environment:
      POSTGRES_DB: ${CASH_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${CASH_DB_PORT}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - cash-db-data:/var/lib/postgresql/data

  transfer-db:
    image: postgres:16
    container_name: bank-transfer-db
    environment:
      POSTGRES_DB: ${TRANSFER_DB_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${TRANSFER_DB_PORT}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - transfer-db-data:/var/lib/postgresql/data

volumes:
  account-db-data:
  cash-db-data:
  transfer-db-data:
