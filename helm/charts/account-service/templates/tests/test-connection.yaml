apiVersion: v1
kind: Pod
metadata:
  name: account-service-test
  namespace: test
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: account-service-test
      image: curlimages/curl:latest
      command: ['sh', '-c']
      args:
        - |
          echo "=== Testing account-service ==="
          curl -f -v http://bank-account-service:9005/actuator/health && echo "Service is healthy"
  restartPolicy: Never