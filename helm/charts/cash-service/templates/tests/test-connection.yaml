apiVersion: v1
kind: Pod
metadata:
  name: cash-service-test
  namespace: test
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: cash-service-test
      image: curlimages/curl:latest
      command: ['sh', '-c']
      args:
        - |
          echo "=== Testing cash-service ==="
          curl -f -v http://bank-cash-service:9004/actuator/health && echo "Service is healthy"
  restartPolicy: Never