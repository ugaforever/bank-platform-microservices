apiVersion: v1
kind: Pod
metadata:
  name: transfer-service-test
  namespace: test
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: transfer-service-test
      image: curlimages/curl:latest
      command: ['sh', '-c']
      args:
        - |
          echo "=== Testing transfer-service ==="
          curl -f -v http://bank-transfer-service:9003/actuator/health && echo "Service is healthy"
  restartPolicy: Never