apiVersion: v1
kind: Pod
metadata:
  name: notification-service-test
  namespace: test
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: notification-service-test
      image: curlimages/curl:latest
      command: ['sh', '-c']
      args:
        - |
          echo "=== Testing notification-service ==="
          curl -f -v http://bank-notification-service:9006/actuator/health && echo "Service is healthy"
  restartPolicy: Never