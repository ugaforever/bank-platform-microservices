keycloak:
  external:
    enabled: true
    serviceName: bank-keycloak
    serviceType: ClusterIP
    port: 9002
    targetPort: 9002
    hostIP: "192.168.10.197"
    # hostname: "keycloak.bank.local"
    annotations: {}

kafka:
  enabled: true

  controller:
    replicaCount: 1
  broker:
    replicaCount: 1

  image:
    registry: docker.io
    repository: bitnamilegacy/kafka
    tag: 3.5.1-debian-11-r25

  kraft:
    enabled: true
    clusterId: "5Lx7d9n6Qr2Rv5x8Yz3wXA"

  listeners:
    client:
      protocol: PLAINTEXT
      containerPort: 9092
    controller:
      protocol: PLAINTEXT
      containerPort: 9093

  advertisedListeners: "PLAINTEXT://bank-kafka:9092"

  persistence:
    enabled: true
    size: 10Gi

  zookeeper:
    enabled: false

  volumePermissions:
    enabled: false

