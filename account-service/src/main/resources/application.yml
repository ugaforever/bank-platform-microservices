#        health-check-interval: 10s

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9002/realms/bank-realm}
      client:
        registration:
          notification-service:
            provider: keycloak
            client-id: notification-service
            client-secret: V7SsZKjFfLc6Ww6bkJSvrnjz3wvBfOgN
            authorization-grant-type: client_credentials
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9002/realms/bank-realm}

feign:
  httpclient:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
      probes:
        enabled: true
        liveness-state:
          enabled: true
        readiness-state:
          enabled: true

logging:
  level:
    org.springframework.cloud.consul: DEBUG
    org.springframework.boot.context.config: DEBUG
